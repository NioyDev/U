<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/menu.css">
    <link rel="stylesheet" href="../css/contacto.css">

    <title>Contacto</title>
</head>

<body>

    <nav class="MenuDesplegable"  role="navigation">
  <div id="menuToggle">
    <input type="checkbox" id="menuCheckbox" />
    <span></span>
    <span></span>
    <span></span>
    <ul id="MenuDesplegable">
    </ul>
  </div>
</nav>

    <nav id="menu"></nav> <!-- Aquí se cargará el menú dinámicamente -->

    <section class="Contacto-Contenedor">
        <div class="Contacto">
            <div class="Titulo-Banner">
                <h2>CONTACTO</h2>
                <div class="hr"></div>
            </div>

            <div class="Contacto-contenido">
                <div class="Contacto-info">
                    <div class="Info-card">
                        <h3>Teléfono</h3>
                        <p>2216-2772</p>
                    </div>

                    <div class="Info-card">
                        <h3>Correo Electrónico</h3>
                        <p>direccioninapopa@gmail.com</p>
                    </div>

                    <div class="Info-card">
                        <h3>Dirección</h3>
                        <p>Apopa, El Salvador</p>
                    </div>

                    <div class="Info-card">
                        <h3>Redes Sociales</h3>
                        <ul class="redes-sociales">
                            <li><a href="https://www.facebook.com/inadeapopa" target="_blank">Facebook</a></li>
                            <li><a href="https://www.instagram.com/ina_apopa_oficial/" target="_blank">Instagram</a></li>
                            <li><a href="https://www.tiktok.com/@inapopaoficial" target="_blank">TikTok</a></li>
                        </ul>
                    </div>
                </div>

                <div class="Formulario-contacto">
                    <h3>Envíanos un mensaje</h3>
                    <form>
                        <div class="form-grupo">
                            <label for="nombre">Nombre Completo</label>
                            <input type="text" id="nombre" name="nombre" required>
                        </div>

                        <div class="form-grupo">
                            <label for="email">Correo Electrónico</label>
                            <input type="email" id="email" name="email" required>
                        </div>

                        <div class="form-grupo">
                            <label for="asunto">Asunto</label>
                            <input type="text" id="asunto" name="asunto" required>
                        </div>

                        <div class="form-grupo">
                            <label for="mensaje">Mensaje</label>
                            <textarea id="mensaje" name="mensaje" rows="5" required></textarea>
                        </div>

                        <button type="submit" class="btn-enviar">Enviar Mensaje</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <script src="../js/menu.js"></script>
    <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
</body>

</html>
